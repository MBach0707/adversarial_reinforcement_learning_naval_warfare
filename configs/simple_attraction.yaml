# configs/simple_attraction.yaml
#
# Baseline scenario: symmetric 1v1 with pure attraction reward.
# Used to validate the DDPG implementation converges (should learn
# to approach opponent in a straight line).
#
# Run: python scripts/train.py --config configs/simple_attraction.yaml --wandb

run_name: simple_attraction
output_dir: outputs
device: cpu
grid_half: 100000

fleet_alice:
  - name: Alice-1
    x: -60000
    y: 0
    max_speed: 20.0
    health: 5
    grid_size: [100000, 100000]
    weapons:
      - name: SSM-HARPOON
        stockpile: 6
        range: 50000
        cooldown: 50
        p_hit: 0.8
        max_salvo_size: 3

fleet_bob:
  - name: Bob-1
    x: 60000
    y: 0
    max_speed: 20.0
    health: 5
    grid_size: [100000, 100000]
    weapons:
      - name: SSM-HARPOON
        stockpile: 6
        range: 50000
        cooldown: 50
        p_hit: 0.8
        max_salvo_size: 3

reward_alice:
  w_gravity:    1.0
  gravity_G:    1.0
  gravity_k:    0.3
  w_lj_sup:     0.0
  w_lj_form:    0.0
  w_pred:       0.0
  w_boundary:   0.5
  kill_reward:   100.0
  death_penalty: 100.0
  victory_bonus: 200.0
  defeat_penalty: 200.0
  reward_fire:  0.0
  time_penalty: -0.005
  p_hit: 0.8

reward_bob:
  w_gravity:    1.0
  gravity_G:    1.0
  gravity_k:    0.3
  w_lj_sup:     0.0
  w_lj_form:    0.0
  w_pred:       0.0
  w_boundary:   0.5
  kill_reward:   100.0
  death_penalty: 100.0
  victory_bonus: 200.0
  defeat_penalty: 200.0
  reward_fire:  0.0
  time_penalty: -0.005
  p_hit: 0.8

agent:
  lr_actor:  0.0001
  lr_critic: 0.001
  gamma:     0.99
  tau:       0.005
  hidden:    256

  noise_alice:
    kind: decay
    dim: 4
    per: episode
    gamma: 0.995
    scale_min: 0.02
    base:
      kind: gaussian
      dim: 4
      sigma: 0.2

  noise_bob:
    kind: decay
    dim: 4
    per: episode
    gamma: 0.995
    scale_min: 0.02
    base:
      kind: gaussian
      dim: 4
      sigma: 0.2

training:
  num_episodes:           1000
  max_steps_per_episode:  300
  warmup_steps:           1000
  batch_size:             64
  save_every:             250
  rollout_every:          100

wandb_project: naval-adversarial-rl
