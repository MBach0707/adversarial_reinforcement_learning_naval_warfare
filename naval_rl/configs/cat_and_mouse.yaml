# configs/cat_and_mouse.yaml
#
# Asymmetric scenario: Alice (2 ships, superior speed) hunts Bob (1 ship, slower).
# Asymmetric reward structure produces more stable early training than
# symmetric setups — see thesis §4.2 for discussion.
#
# Run: python scripts/train.py --config configs/cat_and_mouse.yaml --wandb

run_name: cat_and_mouse
output_dir: outputs
device: cpu          # change to "cuda" if GPU is available
grid_half: 100000    # metres (200×200 km operational area)

# ---------------------------------------------------------------------------
# Fleet definitions
# ---------------------------------------------------------------------------

fleet_alice:
  - name: Alice-1
    x: -80000
    y: -80000
    max_speed: 20.0   # knots
    health: 3
    grid_size: [100000, 100000]
    weapons:
      - name: SSM-HARPOON
        stockpile: 8
        range: 50000
        cooldown: 50
        p_hit: 0.8
        max_salvo_size: 4
      - name: Artillery
        stockpile: 20
        range: 10000
        cooldown: 1
        p_hit: 0.15
        max_salvo_size: 5
    ad_measures:
      - name: SAM-ESSM
        stockpile: 6
        range: 60000
        cooldown: 5

  - name: Alice-2
    x: -80000
    y: -70000
    max_speed: 20.0
    health: 3
    grid_size: [100000, 100000]
    weapons:
      - name: SSM-HARPOON
        stockpile: 8
        range: 50000
        cooldown: 50
        p_hit: 0.8
        max_salvo_size: 4
      - name: Artillery
        stockpile: 20
        range: 10000
        cooldown: 1
        p_hit: 0.15
        max_salvo_size: 5
    ad_measures:
      - name: SAM-ESSM
        stockpile: 6
        range: 60000
        cooldown: 5

fleet_bob:
  - name: Bob-1
    x: 70000
    y: 70000
    max_speed: 7.0    # slower — must evade
    health: 3
    grid_size: [100000, 100000]
    weapons:
      - name: SSM-HARPOON
        stockpile: 4
        range: 50000
        cooldown: 50
        p_hit: 0.8
        max_salvo_size: 2
    ad_measures:
      - name: SAM-ESSM
        stockpile: 4
        range: 60000
        cooldown: 5

# ---------------------------------------------------------------------------
# Reward configs
# ---------------------------------------------------------------------------

reward_alice:
  # Potential fields
  w_gravity:    0.0
  w_lj_sup:     1.0     # engagement-range keeping
  weapon_range: 50000
  w_lj_form:    0.5     # formation cohesion
  d_form:       8000
  w_pred:       0.5     # predictive intercept
  v_max:        617.0   # ~20 knots in m/min
  w_boundary:   1.0

  # Terminal / event rewards
  kill_reward:    100.0
  death_penalty:  100.0
  victory_bonus:  300.0
  defeat_penalty: 300.0
  reward_fire:    0.0
  time_penalty:   -0.01
  p_hit:          0.8

reward_bob:
  # Bob is rewarded for surviving and staying away from Alice
  w_gravity:    -0.5    # repulsive — flee from Alice
  w_lj_sup:     0.0
  weapon_range: 50000
  w_lj_form:    0.0
  w_pred:       0.0
  w_boundary:   1.0

  kill_reward:    200.0
  death_penalty:  100.0
  victory_bonus:  400.0
  defeat_penalty: 200.0
  reward_fire:    0.0
  time_penalty:   +0.05   # positive — Bob is rewarded for surviving each step
  p_hit:          0.8

# ---------------------------------------------------------------------------
# Agent hyperparameters
# ---------------------------------------------------------------------------

agent:
  lr_actor:  0.0001
  lr_critic: 0.001
  gamma:     0.99
  tau:       0.005
  hidden:    256

  noise_alice:
    kind: composite
    parts:
      - kind: decay
        per: episode
        gamma: 0.995
        scale_min: 0.02
        base:
          kind: gaussian
          dim: 8       # 4 actions × 2 ships
          sigma: 0.2
      - kind: sparse-weapon
        n_ships: 2
        p_fire: 0.3

  noise_bob:
    kind: decay
    dim: 4             # 4 actions × 1 ship
    per: episode
    gamma: 0.995
    scale_min: 0.02
    base:
      kind: gaussian
      dim: 4
      sigma: 0.2

# ---------------------------------------------------------------------------
# Training schedule
# ---------------------------------------------------------------------------

training:
  num_episodes:           2000
  max_steps_per_episode:  500
  warmup_steps:           2000
  batch_size:             64
  save_every:             500
  rollout_every:          200

wandb_project: naval-adversarial-rl
